[theme]
base = "light"
primaryColor = "#1E3A8A"        # Bleu Nuit (Très pro, type banque/assurance)
backgroundColor = "#FFFFFF"     # Blanc Pur (Pour la clarté maximale)
secondaryBackgroundColor = "#e8e9ecff" # Bleu Nuit (Pour la barre latérale)
textColor = "#1E3A8A"           # Gris Anthracite (Plus doux à lire que le noir pur)
font = "sans serif"             # Police moderne et nette